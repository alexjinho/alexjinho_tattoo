    <style>
        body {
            font-family: Courier, monospace;
            background-color: #ffffff;
            color: black;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 1rem 0;
        }

        .gallery img {
            width: 100%;
            /* fills screen width */
            height: auto;
            /* keeps proportions */
            display: block;
            /* removes inline gaps */
            margin: 0 auto;
            /* centers if needed */
        }

        .xp-button {
            display: inline-block;
            padding: 8px 16px;
            font-family: Courier, monospace;
            font-size: 14px;
            color: black;
            background: #d4d0c8;
            /* classic XP grey */
            border: 2px solid #808080;
            border-top-color: #ffffff;
            /* light top edge */
            border-left-color: #ffffff;
            /* light left edge */
            text-decoration: none;
            cursor: pointer;
            box-shadow: inset -1px -1px 0 #808080, inset 1px 1px 0 #ffffff;
        }

        .xp-button:active {
            border: 2px solid #808080;
            border-top-color: #404040;
            /* darker top */
            border-left-color: #404040;
            /* darker left */
            box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff;
            background: #c0c0c0;
            /* darker when pressed */
        }

        .back-link {
            margin: 2rem 0;
        }
    </style>
</head>
